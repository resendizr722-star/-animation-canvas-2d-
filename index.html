<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Canvas Glass App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- TU CSS -->
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass">
  <div class="container-fluid">
    <span class="navbar-brand">Canvas Glass App</span>
  </div>
</nav>

<!-- CONTROLES -->
<div class="container mt-4">
  <div class="row g-3 glass p-3">

    <div class="col-md-3">
      <label>Círculos</label>
      <input type="number" id="numCirculos" class="form-control" value="5">
    </div>

    <div class="col-md-3">
      <label>Ancho Canvas</label>
      <input type="number" id="canvasWidth" class="form-control" value="800">
    </div>

    <div class="col-md-3">
      <label>Alto Canvas</label>
      <input type="number" id="canvasHeight" class="form-control" value="500">
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <button id="btnAplicar" class="btn btn-primary w-100">Aplicar</button>
    </div>

  </div>
</div>

<!-- CANVAS -->
<div class="d-flex justify-content-center mt-4">
  <canvas id="canvas"></canvas>
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3 glass">
  <p>Desarrollado por: Roman Resendiz 💻</p>
</footer>

<!-- TU JS -->
<script src="js/main.js"></script>
</body>
</html>
